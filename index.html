<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoViz - Login & Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg-body: #f5f7fc;
            --bg-card: #ffffff;
            --accent-1: #6366f1;
            --gradient-main: linear-gradient(135deg, #6366f1, #8b5cf6);
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --radius: 12px;
            --transition: 0.3s ease;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--bg-card);
            padding: 2.5rem;
            border-radius: var(--radius);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        h2 { color: var(--text-primary); margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-secondary); }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: var(--transition);
            box-sizing: border-box;
        }
        input:focus { outline: none; border-color: var(--accent-1); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
        .btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--gradient-main);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: var(--transition);
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .toggle-link { margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-secondary); }
        .toggle-link a { color: var(--accent-1); text-decoration: none; font-weight: 600; cursor: pointer; }
        .error { color: #ef4444; font-size: 0.85rem; margin-top: 0.5rem; display: none; }
        .success { color: #10b981; font-size: 0.85rem; margin-top: 0.5rem; display: none; }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><i class="fas fa-code"></i> AlgoViz</div>
        <div id="loginForm">
            <h2>Login</h2>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="loginUser" placeholder="Enter username" autocomplete="username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPass" placeholder="Enter password" autocomplete="current-password">
            </div>
            <button class="btn" id="loginBtn" onclick="login()">Login</button>
            <p id="loginError" class="error">Invalid credentials!</p>
            <p class="toggle-link">Don't have an account? <a onclick="toggleForms()">Register</a></p>
        </div>
        <div id="registerForm" style="display: none;">
            <h2>Register</h2>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="regUser" placeholder="Choose a username" autocomplete="username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPass" placeholder="Choose a password" autocomplete="new-password">
            </div>
            <button class="btn" id="regBtn" onclick="register()">Register</button>
            <p id="regError" class="error">Registration failed!</p>
            <p id="regSuccess" class="success">Registration successful!</p>
            <p class="toggle-link">Already have an account? <a onclick="toggleForms()">Login</a></p>
        </div>
    </div>

    <script>
        // Auto-redirect: if opened directly (file://), redirect to localhost server for proper PHP/session support
        if (window.location.protocol === 'file:') {
            window.location.replace('http://localhost/algoviz/index.html');
        }
        const API_BASE = window.location.origin + window.location.pathname.replace(/[^/]*$/, '');

        function toggleForms() {
            document.getElementById('loginForm').style.display = document.getElementById('loginForm').style.display === 'none' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = document.getElementById('registerForm').style.display === 'none' ? 'block' : 'none';
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('regError').style.display = 'none';
            document.getElementById('regSuccess').style.display = 'none';
        }

        function setLoading(btnId, isLoading) {
            const btn = document.getElementById(btnId);
            if (isLoading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> Processing...';
            } else {
                btn.disabled = false;
                btn.innerHTML = btnId === 'loginBtn' ? 'Login' : 'Register';
            }
        }

        async function apiCall(endpoint, data) {
            const response = await fetch(API_BASE + endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify(data)
            });
            return await response.json();
        }

        async function register() {
            const user = document.getElementById('regUser').value.trim();
            const pass = document.getElementById('regPass').value;
            if (!user || !pass) return;

            setLoading('regBtn', true);
            document.getElementById('regError').style.display = 'none';
            document.getElementById('regSuccess').style.display = 'none';

            try {
                const result = await apiCall('register.php', { username: user, password: pass });
                if (result.success) {
                    document.getElementById('regSuccess').style.display = 'block';
                    document.getElementById('regSuccess').textContent = 'Registration successful! Please login.';
                    setTimeout(() => {
                        toggleForms();
                        document.getElementById('loginUser').value = user;
                    }, 1200);
                } else {
                    document.getElementById('regError').textContent = result.message || 'Registration failed!';
                    document.getElementById('regError').style.display = 'block';
                }
            } catch (err) {
                document.getElementById('regError').textContent = 'Connection error. Is XAMPP running?';
                document.getElementById('regError').style.display = 'block';
            } finally {
                setLoading('regBtn', false);
            }
        }

        async function login() {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value;
            if (!user || !pass) return;

            setLoading('loginBtn', true);
            document.getElementById('loginError').style.display = 'none';

            try {
                const result = await apiCall('login.php', { username: user, password: pass });
                if (result.success) {
                    window.location.href = 'dashboard.html';
                } else {
                    document.getElementById('loginError').textContent = result.message || 'Invalid credentials!';
                    document.getElementById('loginError').style.display = 'block';
                }
            } catch (err) {
                document.getElementById('loginError').textContent = 'Connection error. Is XAMPP running?';
                document.getElementById('loginError').style.display = 'block';
            } finally {
                setLoading('loginBtn', false);
            }
        }

        // Enter key support
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                if (document.getElementById('loginForm').style.display !== 'none') login();
                else register();
            }
        });
    </script>
</body>
</html>
