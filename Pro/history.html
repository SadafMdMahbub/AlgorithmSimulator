<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoViz - History</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg-body: #f5f7fc;
            --bg-card: #ffffff;
            --accent-1: #6366f1;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --radius: 12px;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-body); margin: 0; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; background: var(--bg-card); padding: 2rem; border-radius: var(--radius); box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        h1 { margin: 0; color: var(--text-primary); }
        .btn-back { text-decoration: none; color: var(--accent-1); font-weight: 600; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 1rem; border-bottom: 1px solid #e2e8f0; }
        th { color: var(--text-secondary); font-size: 0.9rem; text-transform: uppercase; }
        tr:last-child td { border-bottom: none; }
        .empty-msg { text-align: center; color: var(--text-secondary); padding: 2rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Usage History</h1>
            <a href="dashboard.html" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        </div>
        <div id="historyTable">
            <table>
                <thead>
                    <tr>
                        <th>Action</th>
                        <th>Timestamp</th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                </tbody>
            </table>
        </div>
        <p id="emptyMsg" class="empty-msg" style="display: none;">No history found.</p>
    </div>

    <script>
        const currentUser = localStorage.getItem('currentUser');
        if (!currentUser) window.location.href = 'index.html';

        const users = JSON.parse(localStorage.getItem('users') || '{}');
        const history = users[currentUser]?.history || [];

        const body = document.getElementById('historyBody');
        if (history.length === 0) {
            document.getElementById('historyTable').style.display = 'none';
            document.getElementById('emptyMsg').style.display = 'block';
        } else {
            history.reverse().forEach(entry => {
                const row = document.createElement('tr');
                row.innerHTML = `<td>${entry.action}</td><td>${entry.time}</td>`;
                body.appendChild(row);
            });
        }
    </script>
</body>
</html>
